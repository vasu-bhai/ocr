version: "3.9"

services:

  # ── Main API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: docextract-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://docextract:docextract@db:5432/docextract
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - UPLOAD_DIR=/app/uploads
      - OCR_ENGINE=auto
      - OCR_GPU=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (optional) ───────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: docextract-worker
    command: celery -A worker.celery_app worker --loglevel=info -Q high_priority,batch -c 2
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://docextract:docextract@db:5432/docextract
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=local
      - UPLOAD_DIR=/app/uploads
      - OCR_ENGINE=auto
    depends_on:
      - db
      - redis
    restart: unless-stopped
    profiles:
      - full  # Only start with: docker compose --profile full up

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: docextract-db
    environment:
      POSTGRES_USER: docextract
      POSTGRES_PASSWORD: docextract
      POSTGRES_DB: docextract
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docextract"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docextract-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Flower (Celery monitoring UI) ─────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: docextract-flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles:
      - full
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
